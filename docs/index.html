<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Калькулятор налогов Германия</title>

<meta property="og:title" content="Калькулятор налогов Германия">
<meta property="og:description" content="Узнай сколько реально останется + получи план действий">
<meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=Tax+Germany">

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff;text-align:center}
.wrap{max-width:500px;margin:40px auto;padding:20px}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:6px;border:none}
button{background:#7c3aed;color:#fff;font-weight:bold}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-top:15px}
.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="wrap">

<h1>Сколько реально останется?</h1>
<p>Введи доход — получи цифры + план действий</p>

<input id="income" type="number" placeholder="Например: 30000 €">

<button onclick="calc()">Рассчитать</button>

<div class="card" id="result"></div>

<div class="card">
<h3>Что делать дальше</h3>
<p>1. Регистрация в Finanzamt</p>
<p>2. Получить Steuernummer</p>
<p>3. Вести учет доходов</p>
<p>4. Подать налоговую декларацию</p>
</div>

<div class="card">
<h3>Хочешь подробный план?</h3>
<p>Напиши: list.uspeh2022@gmail.com</p>
</div>

<div class="small">
Это не налоговая консультация
</div>

</div>

<script>
function calc(){
let income = Number(document.getElementById('income').value||0)
let tax = income < 11604 ? 0 : income*0.25
let net = income - tax

document.getElementById('result').innerHTML =
"<b>Налог:</b> "+Math.round(tax)+" €<br><b>Останется:</b> "+Math.round(net)+" €"
}
</script>

</body>
</html>
