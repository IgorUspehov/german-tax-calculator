<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Calculator Germany</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff;text-align:center}
.container{max-width:500px;margin:50px auto;padding:20px}
input,button,select{padding:10px;margin:5px;width:100%;border-radius:6px;border:none}
button{background:#7c3aed;color:#fff;font-weight:bold}
.lang{position:fixed;top:10px;right:10px}
.lang button{width:auto;padding:5px 10px;margin:2px;background:#333}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-top:20px}
.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('de')">DE</button>
<button onclick="setLang('en')">EN</button>
</div>

<div class="container">
<h1 id="title"></h1>
<p id="sub"></p>

<input id="income" type="number" placeholder="EUR">
<button onclick="calc()" id="btn"></button>

<div class="card" id="result"></div>

<div class="card">
<h3 id="road"></h3>
<div id="steps"></div>
</div>

<div class="card small">
<p id="disclaimer"></p>
<p>Contact: list.uspeh2022@gmail.com</p>
</div>

</div>

<script>
let lang='ru'

const t={
ru:{
title:"Калькулятор налогов Германия",
sub:"Freelancer / Gewerbe — расчет и план действий",
btn:"Рассчитать",
road:"Дорожная карта",
disc:"Это не налоговая консультация",
steps:[
"Регистрация в Finanzamt",
"Получение Steuernummer",
"Вести учет доходов",
"Подать Steuererklärung"
]
},
de:{
title:"Steuerrechner Deutschland",
sub:"Freelancer / Gewerbe — Berechnung und Plan",
btn:"Berechnen",
road:"Roadmap",
disc:"Keine Steuerberatung",
steps:[
"Registrierung beim Finanzamt",
"Steuernummer erhalten",
"Einnahmen erfassen",
"Steuererklärung abgeben"
]
},
en:{
title:"Tax Calculator Germany",
sub:"Freelancer / Gewerbe — calculation and plan",
btn:"Calculate",
road:"Roadmap",
disc:"Not tax advice",
steps:[
"Register with Finanzamt",
"Get tax number",
"Track income",
"Submit tax return"
]
}
}

function setLang(l){
lang=l
render()
}

function render(){
document.getElementById('title').innerText=t[lang].title
document.getElementById('sub').innerText=t[lang].sub
document.getElementById('btn').innerText=t[lang].btn
document.getElementById('road').innerText=t[lang].road
document.getElementById('disclaimer').innerText=t[lang].disc

let s=''
t[lang].steps.forEach(x=>s+='<p>'+x+'</p>')
document.getElementById('steps').innerHTML=s
}

function calc(){
let income=Number(document.getElementById('income').value||0)
let tax=income<11604?0:income*0.25
let net=income-tax

document.getElementById('result').innerHTML=
'Tax: '+Math.round(tax)+' EUR<br>Net: '+Math.round(net)+' EUR'
}

render()
</script>

</body>
</html>
